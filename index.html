<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="buttons">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('nature')">Nature</button>
    <button onclick="filterSelection('city')">City</button>
    <button onclick="filterSelection('animals')">Animals</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="nature1.jpg" onclick="openLightbox(0)">
    </div>

    <div class="image city">
        <img src="city1.jpg" onclick="openLightbox(1)">
    </div>

    <div class="image animals">
        <img src="animal2.jpg" onclick="openLightbox(2)">
    </div>

    <div class="image nature">
        <img src="nature3.jpg" onclick="openLightbox(3)">
    </div>

    <div class="image city">
        <img src="city2.jpg" onclick="openLightbox(4)">
    </div>

    <div class="image animals">
        <img src="animal1.jpg" onclick="openLightbox(5)">
    </div>

</div>

<div id="lightbox">

    <span class="close" onclick="closeLightbox()">&times;</span>

    <button class="prev" onclick="changeSlide(-1)">&#10094;</button>

    <img id="lightbox-img">

    <button class="next" onclick="changeSlide(1)">&#10095;</button>

</div>

<script src="script.js"></script>

</body>
</html>
